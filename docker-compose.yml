version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hcp_crm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hcp_crm_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hcp_crm
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SECRET_KEY=supersecretkeyforhcpmoduledevelopment
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hcp_crm_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
